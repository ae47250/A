<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Red concert drum set</title>
  <desc id="desc">A full red concert drum set with chrome stands and multiple cymbals.</desc>
  <defs>
    <linearGradient id="shellRed" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff796f"/>
      <stop offset="0.5" stop-color="#c22e2e"/>
      <stop offset="1" stop-color="#681717"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
