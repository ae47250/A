    <line x1="756" y1="167" x2="704" y2="420"/><line x1="756" y1="167" x2="810" y2="420"/>
    <line x1="295" y1="210" x2="254" y2="420"/><line x1="295" y1="210" x2="330" y2="420"/>
    <line x1="620" y1="235" x2="577" y2="420"/><line x1="620" y1="235" x2="664" y2="420"/>
  </g>
