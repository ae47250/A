<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Green studio drum set</title>
  <desc id="desc">A complete drum kit with bass drum, toms, snare, floor tom, hi-hat, crash and ride cymbals.</desc>
  <defs>
    <linearGradient id="shellGreen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#57a66b"/>
      <stop offset="1" stop-color="#1f5f37"/>
    </linearGradient>
    <linearGradient id="cymbalGold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe58a"/>
      <stop offset="0.55" stop-color="#caa545"/>
      <stop offset="1" stop-color="#8f7126"/>
    </linearGradient>
    <radialGradient id="head" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe8e1"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#102017" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="900" height="520" rx="34" fill="#f1f6f2"/>
  <ellipse cx="450" cy="455" rx="330" ry="38" fill="#c7d5ca" opacity="0.55"/>
  <g stroke="#243329" stroke-width="9" stroke-linecap="round">
    <line x1="181" y1="178" x2="122" y2="410"/>
    <line x1="181" y1="178" x2="218" y2="410"/>
    <line x1="716" y1="155" x2="666" y2="410"/>
    <line x1="716" y1="155" x2="768" y2="410"/>
    <line x1="258" y1="246" x2="225" y2="438"/>
    <line x1="258" y1="246" x2="292" y2="438"/>
    <line x1="649" y1="285" x2="616" y2="438"/>
    <line x1="649" y1="285" x2="685" y2="438"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="181" cy="160" rx="120" ry="32" fill="url(#cymbalGold)" stroke="#4e421f" stroke-width="5"/>
    <ellipse cx="716" cy="138" rx="126" ry="34" fill="url(#cymbalGold)" stroke="#4e421f" stroke-width="5"/>
    <ellipse cx="261" cy="228" rx="78" ry="25" fill="url(#cymbalGold)" stroke="#4e421f" stroke-width="4"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="371" cy="226" rx="98" ry="72" fill="url(#shellGreen)" stroke="#1b2c21" stroke-width="7"/>
    <ellipse cx="371" cy="208" rx="83" ry="47" fill="url(#head)" stroke="#1b2c21" stroke-width="5"/>
    <ellipse cx="513" cy="226" rx="98" ry="72" fill="url(#shellGreen)" stroke="#1b2c21" stroke-width="7"/>
    <ellipse cx="513" cy="208" rx="83" ry="47" fill="url(#head)" stroke="#1b2c21" stroke-width="5"/>
    <circle cx="449" cy="331" r="132" fill="url(#shellGreen)" stroke="#1b2c21" stroke-width="9"/>
    <circle cx="449" cy="331" r="92" fill="url(#head)" stroke="#1b2c21" stroke-width="6"/>
    <circle cx="449" cy="331" r="37" fill="#eef5ee" stroke="#2f6f3e" stroke-width="7"/>
    <ellipse cx="247" cy="346" rx="108" ry="63" fill="url(#shellGreen)" stroke="#1b2c21" stroke-width="7"/>
    <ellipse cx="247" cy="329" rx="93" ry="44" fill="url(#head)" stroke="#1b2c21" stroke-width="5"/>
    <ellipse cx="647" cy="346" rx="104" ry="122" fill="url(#shellGreen)" stroke="#1b2c21" stroke-width="7"/>
    <ellipse cx="647" cy="310" rx="90" ry="52" fill="url(#head)" stroke="#1b2c21" stroke-width="5"/>
  </g>
  <g stroke="#7d4a20" stroke-width="8" stroke-linecap="round">
    <line x1="403" y1="89" x2="452" y2="229"/>
    <line x1="528" y1="92" x2="477" y2="229"/>
  </g>
</svg>
