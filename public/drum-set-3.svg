<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Blue jazz drum set</title>
  <desc id="desc">A full blue jazz drum kit with stool, cymbals, toms and bass drum.</desc>
  <defs>
    <linearGradient id="shellBlue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#74b9ff"/>
      <stop offset="0.55" stop-color="#256eb4"/>
      <stop offset="1" stop-color="#153c74"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff6b7"/>
      <stop offset="0.58" stop-color="#d6a842"/>
      <stop offset="1" stop-color="#7e5f1c"/>
    </linearGradient>
    <radialGradient id="head" cx="50%" cy="40%" r="62%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4edf5"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#091222" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="900" height="520" rx="34" fill="#eef5fb"/>
  <ellipse cx="450" cy="455" rx="345" ry="40" fill="#c5d2dc" opacity="0.62"/>
  <g stroke="#1e2c38" stroke-width="8" stroke-linecap="round">
    <line x1="198" y1="155" x2="148" y2="416"/><line x1="198" y1="155" x2="239" y2="416"/>
    <line x1="716" y1="165" x2="673" y2="416"/><line x1="716" y1="165" x2="760" y2="416"/>
    <line x1="325" y1="245" x2="291" y2="425"/><line x1="325" y1="245" x2="361" y2="425"/>
    <line x1="592" y1="246" x2="556" y2="425"/><line x1="592" y1="246" x2="630" y2="425"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="198" cy="138" rx="115" ry="32" fill="url(#gold)" stroke="#453918" stroke-width="5"/>
    <ellipse cx="716" cy="147" rx="118" ry="33" fill="url(#gold)" stroke="#453918" stroke-width="5"/>
    <ellipse cx="454" cy="105" rx="112" ry="28" fill="url(#gold)" stroke="#453918" stroke-width="5"/>
  </g>
  <g stroke="#1e2c38" stroke-width="7" stroke-linecap="round">
    <line x1="454" y1="129" x2="454" y2="275"/><line x1="454" y1="275" x2="405" y2="425"/><line x1="454" y1="275" x2="502" y2="425"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="365" cy="213" rx="92" ry="76" fill="url(#shellBlue)" stroke="#101b28" stroke-width="7"/>
    <ellipse cx="365" cy="192" rx="76" ry="47" fill="url(#head)" stroke="#101b28" stroke-width="5"/>
    <ellipse cx="517" cy="214" rx="92" ry="76" fill="url(#shellBlue)" stroke="#101b28" stroke-width="7"/>
    <ellipse cx="517" cy="193" rx="76" ry="47" fill="url(#head)" stroke="#101b28" stroke-width="5"/>
    <circle cx="447" cy="333" r="132" fill="url(#shellBlue)" stroke="#101b28" stroke-width="10"/>
    <circle cx="447" cy="333" r="96" fill="url(#head)" stroke="#101b28" stroke-width="6"/>
    <text x="447" y="346" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#256eb4">L</text>
    <ellipse cx="260" cy="344" rx="101" ry="62" fill="url(#shellBlue)" stroke="#101b28" stroke-width="7"/>
    <ellipse cx="260" cy="325" rx="86" ry="41" fill="url(#head)" stroke="#101b28" stroke-width="5"/>
    <ellipse cx="637" cy="344" rx="101" ry="116" fill="url(#shellBlue)" stroke="#101b28" stroke-width="7"/>
    <ellipse cx="637" cy="306" rx="86" ry="50" fill="url(#head)" stroke="#101b28" stroke-width="5"/>
    <rect x="82" y="325" width="82" height="34" rx="17" fill="#1e2c38"/>
    <line x1="123" y1="359" x2="96" y2="439" stroke="#1e2c38" stroke-width="7" stroke-linecap="round"/>
    <line x1="123" y1="359" x2="151" y2="439" stroke="#1e2c38" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g stroke="#8a5328" stroke-width="8" stroke-linecap="round">
    <line x1="390" y1="91" x2="450" y2="225"/>
    <line x1="526" y1="88" x2="482" y2="228"/>
  </g>
</svg>
